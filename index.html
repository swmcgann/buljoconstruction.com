<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remodeling Portfolio</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; color: #111; }
    header { padding: 28px 18px; border-bottom: 1px solid #eee; }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .sub { margin: 0; opacity: .75; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; gap: 10px; padding: 18px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card { border-radius: 10px; overflow: hidden; background: #f7f7f7; }
    img { width: 100%; height: 240px; object-fit: cover; display: block; }
    footer { padding: 18px; border-top: 1px solid #eee; font-size: 14px; opacity: .8; }
    a { color: inherit; }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Remodeling Portfolio</h1>
      <p class="sub">Kitchens • Bathrooms • Basements • Custom Work</p>
      <p class="sub">Call/Text: <a href="tel:+10000000000">(000) 000-0000</a></p>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <!-- Replace these with your photos later -->
<div class="card"><img src="photos/photo1.jpeg"></div>
<div class="card"><img src="photos/photo2.jpeg"></div>

<div class="card"><img src="photos/photo5.jpeg"></div>
<div class="card"><img src="photos/photo6.jpeg"></div>
<div class="card"><img src="photos/photo7.jpeg"></div>
<div class="card"><img src="photos/photo8.jpeg"></div>
<div class="card"><img src="photos/photo9.jpeg"></div>
<div class="card"><img src="photos/photo10.jpeg"></div>
<div class="card"><img src="photos/photo11.jpeg"></div>
<div class="card"><img src="photos/photo12.jpeg"></div>
<div class="card"><img src="photos/photo13.jpeg"></div>
<div class="card"><img src="photos/photo14.jpeg"></div>
<div class="card"><img src="photos/photo15.jpeg"></div>
<div class="card"><img src="photos/photo16.jpeg"></div>
<div class="card"><img src="photos/photo17.jpeg"></div>
    </div>
  </main>

  <footer>
    <div class="wrap">
      © <span id="y"></span> Remodeling Portfolio • All photos are examples of completed work
    </div>
  </footer>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
